<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Darrin Wehser</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card-bg: #050505; --border: #27272a; --text-main: #ffffff; --text-dim: #d4d4d8; --accent: #38bdf8; --meta: #71717a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Geist', sans-serif; line-height: 1.6; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 8%; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(12px); z-index: 100; }
        .logo { font-weight: 700; letter-spacing: 0.5px; font-size: 1rem; }
        .logo a { color: #fff; text-decoration: none; }
        .nav-links a { color: var(--text-dim); text-decoration: none; margin-left: 2.5rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .container { padding: 6rem 8% 10rem; max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 2rem; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .gallery-item { position: relative; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--card-bg); }
        .gallery-item img { width: 100%; height: 300px; object-fit: cover; display: block; transition: transform 0.3s; }
        .gallery-item:hover img { transform: scale(1.05); }
        
        /* Lightbox Overlay */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; cursor: zoom-out; }
        .lightbox:target { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; border: 1px solid var(--border); }
        
        footer { padding: 4rem 8%; border-top: 1px solid var(--border); text-align: center; font-size: 0.65rem; color: var(--meta); font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html">Darrin Wehser</a></div>
        <div class="nav-links">
            <a href="portfolio.html">Portfolio</a>
            <a href="demo-reel.html">Demo Reel</a>
            <a href="resume.html">Resume</a>
            <a href="index.html#contact">Contact</a>
        </div>
    </nav>

    <div class="container">
        <h1>Portfolio Gallery</h1>
        <div class="gallery">
            <!-- Add your images here -->
            <a href="#img1" class="gallery-item">
                <img src="https://static.wixstatic.com/media/8a02c7_313b9cfa9fdf45f8b57f59d3fecd7bd8~mv2.jpg" alt="Terminator">
            </a>
            <div id="img1" class="lightbox" onclick="history.back()">
                <img src="https://static.wixstatic.com/media/8a02c7_313b9cfa9fdf45f8b57f59d3fecd7bd8~mv2.jpg">
            </div>
            
            <a href="#img2" class="gallery-item">
                <img src="https://static.wixstatic.com/media/8a02c7_d298b91638f3462aadb95ecdde685768~mv2.jpg" alt="Aquaman">
            </a>
            <div id="img2" class="lightbox" onclick="history.back()">
                <img src="https://static.wixstatic.com/media/8a02c7_d298b91638f3462aadb95ecdde685768~mv2.jpg">
            </div>
            <!-- Duplicate the above block to add more images -->
        </div>
    </div>

    <footer>© 2026 DARRIN WEHSER // TECHNICAL ARCHIVE</footer>
</body>
</html>
