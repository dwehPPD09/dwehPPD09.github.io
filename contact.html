<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Darrin Wehser</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card-bg: #050505; --border: #27272a; --text-main: #ffffff; --text-dim: #d4d4d8; --accent: #38bdf8; --meta: #71717a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Geist', sans-serif; line-height: 1.6; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 8%; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(12px); z-index: 100; }
        .logo { font-weight: 700; font-size: 1rem; }
        .logo a { color: #fff; text-decoration: none; }
        .nav-links a { color: var(--text-dim); text-decoration: none; margin-left: 2.5rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .container { padding: 12rem 8% 10rem; max-width: 800px; margin: 0 auto; text-align: center; }
        h1 { font-size: 3rem; letter-spacing: -2px; margin-bottom: 1.5rem; }
        .contact-desc { color: var(--text-dim); font-size: 1.2rem; margin-bottom: 4rem; font-weight: 300; }

        .contact-card { background: var(--card-bg); border: 1px solid var(--border); padding: 4rem; border-radius: 8px; }
        .contact-btn { 
            display: inline-block; 
            background: var(--accent); 
            color: #000; 
            padding: 1.2rem 3rem; 
            border-radius: 4px; 
            font-weight: 700; 
            text-decoration: none; 
            font-size: 0.9rem; 
            letter-spacing: 1px;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }
        .contact-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        footer { padding: 8rem 8%; background: #000; border-top: 1px solid var(--border); text-align: center; }
        .social-links { display: flex; gap: 3rem; flex-wrap: wrap; justify-content: center; margin-bottom: 3rem; }
        .social-links a { color: var(--text-dim); text-decoration: none; font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; }
        .social-links a:hover { color: var(--accent); }
        .copyright { font-size: 0.65rem; color: #52525b; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html">Darrin Wehser</a></div>
        <div class="nav-links">
            <a href="portfolio.html">Portfolio</a>
            <a href="demo-reel.html">Demo Reel</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="container">
        <h1>Connect</h1>
        <p class="contact-desc">Available for technical direction, grooming supervision, and generative AI workflow integration.</p>
        
        <div class="contact-card">
            <button onclick="sendEmail()" class="contact-btn">SEND AN EMAIL</button>
            <p style="margin-top: 2rem; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--meta);">PROTECTED BY JAVASCRIPT OBFUSCATION</p>
        </div>
    </div>

    <script>
        function sendEmail() {
            // This script assembles your email on the fly to prevent scraping
            var user = "d";
            var domain = "gmail.com";
            var subject = "Inquiry from Portfolio";
            window.location.href = "mailto:" + user + "@" + domain + "?subject=" + encodeURIComponent(subject);
        }
    </script>

    <footer>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/dwehser" target="_blank">LINKEDIN</a>
            <a href="https://www.artstation.com/dwehser" target="_blank">ARTSTATION</a>
            <a href="https://www.youtube.com/watch?v=rPlgIsu7tXA" target="_blank">YOUTUBE</a>
            <a href="http://www.imdb.com/name/nm1277925/" target="_blank">IMDB</a>
            <a href="http://vimeo.com/dwehser" target="_blank">VIMEO</a>
        </div>
        <div class="copyright">© 2026 DARRIN WEHSER // ALL RIGHTS RESERVED</div>
    </footer>
</body>
</html>
